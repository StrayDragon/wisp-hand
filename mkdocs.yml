site_name: Wisp Hand MCP
site_description: "Wisp Hand MCP: Hyprland-first computer-use MCP server foundation (observe/capture/input/batch/vision/tasks)."
site_url: https://straydragon.github.io/wisp-hand/

docs_dir: docs/mkdocs
site_dir: site

theme:
  name: material
  language: zh
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - tables
  - toc:
      permalink: true

nav:
  - 首页: index.md
  - 安装与依赖: installation.md
  - 快速开始: getting-started.md
  - 核心概念:
      - Session 与 Scope: concepts/session-scope.md
      - 坐标与缩放: concepts/coordinates.md
  - 工具参考: tools.md
  - 场景:
      - Godot: scenarios/godot.md
  - 排障: troubleshooting.md
  - Roadmap: roadmap.md
