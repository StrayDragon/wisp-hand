name: CI

on:
  workflow_dispatch:
  # push:
  #   branches: [main]
  # pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.14"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev --locked

      - name: Tests (pytest)
        run: uv run pytest

      - name: Build (sdist + wheel)
        run: uv build --no-sources

